<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>噴膠穩定性分析系統 v32.0（離線單檔）</title>

  <style>
    :root { --primary: #2563eb; --secondary: #64748b; --success: #32CD32; --danger: #dc2626; --bg: #f1f5f9; }
    body { font-family: "Segoe UI","Microsoft JhengHei",sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; font-size: 14px; }
    .container { max-width: 1450px; margin: auto; display: grid; grid-template-columns: 430px 1fr; gap: 20px; }
    .sidebar, .main-content { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .sidebar { height: fit-content; }
    .section-title { font-weight: bold; font-size: 1.1em; margin-bottom: 12px; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 5px; margin-top: 15px; }
    .config-group { margin-bottom: 10px; }
    .config-group label { display: block; font-size: 0.85em; color: var(--secondary); margin-bottom: 3px; }
    .config-group input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    .req-label { color: var(--danger); font-weight: bold; }
    .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .input-box { display: flex; flex-direction: column; background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; }
    .input-box label { font-size: 0.75em; color: var(--secondary); margin-bottom: 4px; text-align: center; font-weight: bold; }
    .input-box input { width: 100%; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; text-align: center; font-weight: bold; box-sizing: border-box; font-size: 16px; }
    .out-of-range { color: var(--danger) !important; font-weight: bold; }
    .time-msg { margin-top: 4px; font-size: 0.75em; color: #32CD32; text-align: center; font-family: monospace; font-weight: bold; height: 1.2em; }
    .btn-record-light { margin-top: 5px; padding: 6px; background: #90EE90; color: #155724; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold; }
    .method-box { background: #f8fafc; padding: 12px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 5px; }
    .method-res { font-size: 0.95em; font-weight: bold; color: #1e40af; margin-bottom: 4px; text-align: center; }
    .btn-row { display: flex; gap: 5px; margin-top: 8px; }
    .btn-apply { flex: 1; font-size: 0.85em; padding: 8px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-clear-sm { flex: 1; font-size: 0.85em; padding: 8px; background: #94a3b8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn-sub-rec { padding: 4px; background: #e2e8f0; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.75em; cursor: pointer; margin-top: 4px; }
    .results-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
    .res-card { background: #f1f5f9; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; }
    .res-card small { font-size: 0.85em; color: var(--secondary); display: block; }
    .res-card span { font-size: 1.35em; font-weight: bold; color: var(--primary); }
    .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .btn-main-row { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.1em; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-drawing { background: #0f172a; color: white; }
    .btn-clear { background: #e2e8f0; color: #475569; }
    .btn-export { background: #166534; color: white; }
    .btn-demo { background: #7c3aed; color: white; }
    #status { padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; display: none; font-size: 1.3em; }
    .pass { background: #dcfce7; color: #166534; border: 1px solid #16a34a; }
    .fail { background: #fee2e2; color: #991b1b; border: 1px solid #dc2626; }
    .error-estimate { background: #fffbeb; border: 1px solid #fef3c7; padding: 15px; border-radius: 6px; margin-top: 15px; font-size: 1.1em; line-height: 1.6; }
    .chart-container { margin-top: 25px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; height: 380px; }
    canvas { width: 100%; height: 100%; display: block; }

    #pdfReport { display: none; }
    @media print {
      @page { margin: 12mm; size: A4 portrait; }
      body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .container { display: none !important; }
      #pdfReport { display: block !important; width: 100%; font-size: 12px; }
      .p-logo-placeholder { position: absolute; top: 0; right: 0; width: 120px; height: 60px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 10px; text-align: center; }
      .p-header { text-align: center; border-bottom: 3px solid #333; padding-bottom: 8px; margin-bottom: 15px; position: relative; }
      .p-section { margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 5px; page-break-inside: avoid; }
      .p-title { font-weight: bold; background: #f1f5f9; padding: 6px 12px; margin: -10px -10px 10px -10px; border-bottom: 1px solid #ccc; font-size: 1.1em; }
      .p-table { width: 100%; border-collapse: collapse; margin-bottom: 5px; }
      .p-table th, .p-table td { border: 1px solid #eee; padding: 8px; text-align: left; }
      .p-table th { background: #fafafa; width: 25%; color: #475569; font-size: 11px; }
      .green-text { color: #32CD32 !important; font-weight: bold; }
      .red-text { color: #dc2626 !important; font-weight: bold; }
      #p-chart-box { width: 100%; height: 380px; text-align: center; margin: 15px 0; border: 1px solid #f0f0f0; }
      .page-break { page-break-before: always; }
      .p-data-grid { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid #bbb; }
      .p-data-item { border: 0.5px solid #eee; padding: 5px 8px; display: flex; justify-content: space-between; font-size: 11px; }
    }
  </style>
</head>

<body>
  <input type="hidden" id="targetSingle" value="0.003">

  <div class="container">
    <div class="sidebar">
      <div class="section-title" style="margin-top:0;">生產參數記錄</div>

      <div class="config-group">
        <label>測試人員 <span class="req-label">(必要填入)</span></label>
        <input type="text" id="tester_name" placeholder="請輸入測試人員">
      </div>

      <div class="config-group">
        <label>膠水資訊</label>
        <input type="text" id="glue_info" placeholder="例如：批號/型號/黏度等">
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="config-group">
          <label>目標重量 (mg)</label>
          <input type="number" step="0.01" id="target_total_weight" value="1.00" oninput="autoUpdateDots(); autosave();">
        </div>
        <div class="config-group">
          <label>誤差百分比 (±%)</label>
          <input type="number" id="error_percentage" value="5" oninput="autoUpdateDots(); autosave();">
        </div>
      </div>

      <div class="config-group">
        <label>Cpk 閥值門檻</label>
        <input type="number" id="cpk_threshold" value="1.66" step="0.01" oninput="autoUpdateDots(); autosave();">
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
        <div class="config-group"><label>Rising Time (ms)</label><input type="number" step="0.01" id="p_rising" oninput="autosave();"></div>
        <div class="config-group"><label>Open Time (ms)</label><input type="number" step="0.01" id="p_open" oninput="autosave();"></div>
        <div class="config-group"><label>Falling Time (ms)</label><input type="number" step="0.01" id="p_falling" oninput="autosave();"></div>
        <div class="config-group"><label>Delay Time (ms)</label><input type="number" step="0.01" id="p_delay" oninput="autosave();"></div>
      </div>

      <div class="config-group">
        <label>背壓氣壓 (kg/cm²)</label>
        <input type="number" step="0.01" id="p_pressure" oninput="autosave();">
      </div>

      <div class="section-title">單點膠重測試一 (線性回歸)</div>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
        <div class="config-group">
          <label>1000點(mg)</label>
          <input type="number" id="w1000" oninput="runMethod1(); autosave();">
          <button class="btn-sub-rec" onclick="recTime('t1_1'); autosave();">記錄</button>
          <div id="t1_1" class="time-msg"></div>
        </div>
        <div class="config-group">
          <label>2000點(mg)</label>
          <input type="number" id="w2000" oninput="runMethod1(); autosave();">
          <button class="btn-sub-rec" onclick="recTime('t1_2'); autosave();">記錄</button>
          <div id="t1_2" class="time-msg"></div>
        </div>
        <div class="config-group">
          <label>3000點(mg)</label>
          <input type="number" id="w3000" oninput="runMethod1(); autosave();">
          <button class="btn-sub-rec" onclick="recTime('t1_3'); autosave();">記錄</button>
          <div id="t1_3" class="time-msg"></div>
        </div>
        <div class="config-group">
          <label>4000點(mg)</label>
          <input type="number" id="w4000" oninput="runMethod1(); autosave();">
          <button class="btn-sub-rec" onclick="recTime('t1_4'); autosave();">記錄</button>
          <div id="t1_4" class="time-msg"></div>
        </div>
        <div class="config-group">
          <label>5000點(mg)</label>
          <input type="number" id="w5000" oninput="runMethod1(); autosave();">
          <button class="btn-sub-rec" onclick="recTime('t1_5'); autosave();">記錄</button>
          <div id="t1_5" class="time-msg"></div>
        </div>
        <div class="config-group">
          <label>6000點(mg)</label>
          <input type="number" id="w6000" oninput="runMethod1(); autosave();">
          <button class="btn-sub-rec" onclick="recTime('t1_6'); autosave();">記錄</button>
          <div id="t1_6" class="time-msg"></div>
        </div>
      </div>

      <div class="method-box">
        <div id="m1Res" class="method-res">線性回歸單點: - mg</div>
        <div id="t1_main" class="time-msg"></div>
        <div class="btn-row">
          <button class="btn-apply" onclick="applySingle('m1'); autosave();">採用基準</button>
          <button class="btn-clear-sm" onclick="clearArea(['w1000','w2000','w3000','w4000','w5000','w6000','t1_1','t1_2','t1_3','t1_4','t1_5','t1_6','t1_main']); runMethod1(); autosave();">清除</button>
        </div>
      </div>

      <div class="section-title">單點膠重測試二 (幾何驗證)</div>
      <div class="config-group">
        <label>膠材密度</label>
        <input type="number" id="density" value="1.70" oninput="runMethod2(); autosave();">
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
        <div class="config-group"><label>D(μm)</label><input type="number" id="diameter" oninput="runMethod2(); autosave();"></div>
        <div class="config-group"><label>H(μm)</label><input type="number" id="height" oninput="runMethod2(); autosave();"></div>
        <div class="config-group"><label>R(μm)</label><input type="number" id="radiusR" oninput="runMethod2(); autosave();"></div>
      </div>

      <div class="method-box">
        <div id="m2Res" class="method-res">幾何計算單點: - mg</div>
        <div id="t2_main" class="time-msg"></div>
        <div class="btn-row">
          <button class="btn-apply" onclick="applySingle('m2'); autosave();">採用基準</button>
          <button class="btn-clear-sm" onclick="clearArea(['diameter','height','radiusR','t2_main']); runMethod2(); autosave();">清除</button>
        </div>
      </div>

      <div class="error-estimate">
        <b>Cpk <span id="label_cpk">1.66</span> 容許誤差極限：</b><br>
        • 膠點數量誤差：± <span id="errDots">-</span> 點<br>
        • 每單點重量誤差：<span id="errSingle">-</span> mg<br>
        • 單點膠重測試擇一使用
      </div>

      <div class="config-group" style="margin-top:10px;">
        <label>測試噴塗點數</label>
        <input type="number" id="testDots" readonly style="background:#eef2ff;">
      </div>
    </div>

    <div class="main-content">
      <h2 id="mainTitle" style="margin-top:0; color: var(--primary);">噴膠穩定性分析系統 v32.0（離線單檔）</h2>
      <div id="status"></div>

      <div class="results-grid">
        <div class="res-card"><small>平均總重</small><span id="resAvg">-</span></div>
        <div class="res-card"><small>標準差 (σ)</small><span id="resStd">-</span></div>
        <div class="res-card"><small>Cpk 指標</small><span id="resCpk">-</span></div>
        <div class="res-card"><small>單點估算</small><span id="resSingle">-</span><small>mg</small></div>
      </div>

      <div class="grid-inputs" id="inputContainer"></div>

      <div class="btn-group">
        <div class="btn-main-row">
          <button class="btn btn-primary" onclick="runAnalysis(); autosave();">執行數據分析</button>
          <button class="btn btn-drawing" onclick="drawTrendChart();">繪圖</button>
        </div>
        <div class="btn-main-row">
          <button class="btn btn-demo" onclick="loadDemoData();">載入範例資料</button>
          <button class="btn btn-clear" onclick="resetInputs(); autosave();">清空數據</button>
        </div>
        <button class="btn btn-export" onclick="exportPDFReport();">匯出 PDF 報告（列印）</button>
      </div>

      <div class="chart-container">
        <canvas id="stabilityChart"></canvas>
      </div>
    </div>
  </div>

  <!-- 列印用報表 -->
  <div id="pdfReport">
    <div class="p-header">
      <div class="p-logo-placeholder" id="pdf-logo">Company Logo</div>
      <h1>噴膠穩定性分析報告 (Stability Report)</h1>
      <div id="p-date-now" style="font-weight:bold;"></div>
    </div>

    <div class="p-section">
      <div class="p-title">一、 生產設定與校準參數</div>
      <table class="p-table" id="p-table-params"></table>
    </div>

    <div class="p-section">
      <div class="p-title">二、 趨勢分析結果</div>
      <div style="display:flex; justify-content:space-around; font-weight:bold; padding:10px; background:#f8fafc; border:1px solid #eee;">
        <span>平均: <span id="p-avg">-</span> mg</span>
        <span>Std(σ): <span id="p-std">-</span></span>
        <span>Cpk: <span id="p-cpk">-</span></span>
        <span id="p-final-status">-</span>
      </div>
      <div id="p-chart-box">
        <img id="p-chart-img" style="width:100%; height:auto; display:block; margin:auto;" alt="">
      </div>
    </div>

    <div class="page-break"></div>

    <div class="p-section">
      <div class="p-title">三、 30 組測試數據清單</div>
      <div class="p-data-grid" id="p-data-table"></div>
    </div>
  </div>

  <script>
    // ===== 狀態 =====
    let m1Val = 0, m2Val = 0, adoptedMethod = "";
    const LS_KEY = "spray_stability_v32_offline_singlefile";

    // ===== 初始化 =====
    window.onload = function () {
      initGrid();
      restore();
      // 沒資料就給乾淨的預設（不灌假數據）
      applySafeDefaultsIfEmpty();
      runMethod1();
      runMethod2();
      autoUpdateDots();
      // 只在已有數據時才自動畫圖
      if (hasAtLeastTwoDataPoints()) {
        runAnalysis();
        drawTrendChart();
      } else {
        clearChart();
      }
      // 視窗改變時重繪
      window.addEventListener("resize", () => {
        if (hasAtLeastTwoDataPoints()) drawTrendChart();
        else clearChart();
      });
    };

    function initGrid() {
      const container = document.getElementById('inputContainer');
      container.innerHTML = '';
      for (let i = 1; i <= 30; i++) {
        container.innerHTML += `
          <div class="input-box">
            <label>No.${i}</label>
            <input type="text" inputmode="decimal" class="data-in" id="input-${i}" oninput="autosave();">
            <button class="btn-record-light" onclick="recTime('t-data-${i}'); autosave();">記錄</button>
            <div class="time-msg" id="t-data-${i}"></div>
          </div>
        `;
      }
    }

    // ===== 時間紀錄 =====
    function getTime() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ":" +
             d.getMinutes().toString().padStart(2,'0') + ":" +
             d.getSeconds().toString().padStart(2,'0');
    }
    function recTime(id) {
      const el = document.getElementById(id);
      if (el) el.innerText = getTime();
    }

    // ===== 誤差/點數推導 =====
    function autoUpdateDots() {
      const targetW = parseFloat(document.getElementById('target_total_weight').value) || 1.0;
      const errP    = parseFloat(document.getElementById('error_percentage').value) || 5;
      const cpkThr  = parseFloat(document.getElementById('cpk_threshold').value) || 1.66;
      const sgl     = parseFloat(document.getElementById('targetSingle').value);

      document.getElementById('label_cpk').innerText = cpkThr.toString();

      if (sgl > 0) {
        const dots = Math.round(targetW / sgl);
        document.getElementById('testDots').value = dots;
        const ts = (targetW * (errP / 100)) / (3 * cpkThr);
        document.getElementById('errSingle').innerText = "± " + ts.toFixed(5);
        document.getElementById('errDots').innerText = (ts / sgl).toFixed(1);
      } else {
        document.getElementById('testDots').value = "";
        document.getElementById('errSingle').innerText = "-";
        document.getElementById('errDots').innerText = "-";
      }
    }

    // ===== 單點估算方法 1：線性回歸 =====
    function runMethod1() {
      const x = [1000, 2000, 3000, 4000, 5000, 6000];
      const y = [
        parseFloat(document.getElementById('w1000').value),
        parseFloat(document.getElementById('w2000').value),
        parseFloat(document.getElementById('w3000').value),
        parseFloat(document.getElementById('w4000').value),
        parseFloat(document.getElementById('w5000').value),
        parseFloat(document.getElementById('w6000').value)
      ];

      const vX = [], vY = [];
      y.forEach((v, i) => { if (!isNaN(v)) { vX.push(x[i]); vY.push(v); } });

      if (vX.length >= 2) {
        const n = vX.length;
        let sX=0, sY=0, sXY=0, sXX=0;
        for (let i=0; i<n; i++) {
          sX += vX[i];
          sY += vY[i];
          sXY += vX[i] * vY[i];
          sXX += vX[i] * vX[i];
        }
        const denom = (n*sXX - sX*sX);
        if (denom === 0) {
          m1Val = 0;
          document.getElementById('m1Res').innerText = '線性回歸單點: - mg';
          return;
        }
        m1Val = (n*sXY - sX*sY) / denom;
        if (!isFinite(m1Val) || m1Val <= 0) {
          m1Val = 0;
          document.getElementById('m1Res').innerText = '線性回歸單點: - mg';
          return;
        }
        document.getElementById('m1Res').innerText = `線性回歸單點: ${m1Val.toFixed(6)} mg`;
      } else {
        m1Val = 0;
        document.getElementById('m1Res').innerText = '線性回歸單點: - mg';
      }
    }

    // ===== 單點估算方法 2：幾何法（照你原本公式；radiusR 目前未用） =====
    function runMethod2() {
      const d = parseFloat(document.getElementById('diameter').value);
      const h = parseFloat(document.getElementById('height').value);
      const rho = parseFloat(document.getElementById('density').value);

      if (isNaN(d) || isNaN(h) || isNaN(rho) || d <= 0 || h <= 0 || rho <= 0) {
        m2Val = 0;
        document.getElementById('m2Res').innerText = '幾何計算單點: - mg';
        return;
      }

      // 你原本的計算（保持一致）：把 μm 轉成 cm（/10000）
      const dcm = (d / 10000);
      const hcm = (h / 10000);

      m2Val = ((Math.PI * (hcm) / 6) * (3 * Math.pow((dcm)/2, 2) + Math.pow(hcm, 2))) * rho * 1000;
      if (!isFinite(m2Val) || m2Val <= 0) {
        m2Val = 0;
        document.getElementById('m2Res').innerText = '幾何計算單點: - mg';
        return;
      }
      document.getElementById('m2Res').innerText = `幾何計算單點: ${m2Val.toFixed(6)} mg`;
    }

    function applySingle(type) {
      const val = (type === 'm1') ? m1Val : m2Val;
      if (val > 0 && isFinite(val)) {
        document.getElementById('targetSingle').value = val.toFixed(6);
        adoptedMethod = type;
        autoUpdateDots();
        recTime(type === 'm1' ? 't1_main' : 't2_main');
        document.getElementById('resSingle').innerText = val.toFixed(6);
      }
    }

    // ===== 數據分析（平均/標準差/Cpk） =====
    function runAnalysis() {
      const targetW = parseFloat(document.getElementById('target_total_weight').value);
      const errP = parseFloat(document.getElementById('error_percentage').value);
      const cpkThr = parseFloat(document.getElementById('cpk_threshold').value);

      if (!isFinite(targetW) || !isFinite(errP) || !isFinite(cpkThr)) return;

      const USL = targetW * (1 + errP / 100);
      const LSL = targetW * (1 - errP / 100);

      const inputs = document.querySelectorAll('.data-in');
      const vals = [];
      inputs.forEach(input => {
        const val = parseFloat(input.value);
        if (!isNaN(val)) {
          vals.push(val);
          input.classList.toggle('out-of-range', val > USL || val < LSL);
        } else {
          input.classList.remove('out-of-range');
        }
      });

      if (vals.length < 2) {
        document.getElementById('status').style.display = 'none';
        document.getElementById('resAvg').innerText = '-';
        document.getElementById('resStd').innerText = '-';
        document.getElementById('resCpk').innerText = '-';
        return;
      }

      const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
      const variance = vals.map(x => Math.pow(x-avg,2)).reduce((a,b)=>a+b,0) / (vals.length - 1);
      const std = Math.sqrt(variance);

      let cpk;
      if (std === 0) {
        cpk = Infinity;
      } else {
        cpk = Math.min((USL - avg) / (3 * std), (avg - LSL) / (3 * std));
      }

      document.getElementById('resAvg').innerText = avg.toFixed(4);
      document.getElementById('resStd').innerText = std.toFixed(5);
      document.getElementById('resCpk').innerText = (cpk === Infinity) ? '∞' : cpk.toFixed(2);

      const dots = parseInt(document.getElementById('testDots').value) || 1;
      document.getElementById('resSingle').innerText = (avg / dots).toFixed(6);

      const st = document.getElementById('status');
      st.style.display = 'block';
      const pass = (cpk === Infinity) ? true : (cpk >= cpkThr);
      st.className = pass ? 'pass' : 'fail';
      const cpkShow = (cpk === Infinity) ? '∞' : cpk.toFixed(2);
      st.innerText = `穩定性判定：${pass ? 'PASS' : 'FAIL'} (Cpk: ${cpkShow})`;
    }

    // ===== 繪圖（純 Canvas，無 Chart.js；真正單檔） =====
    function clearChart() {
      const canvas = document.getElementById('stabilityChart');
      const ctx = canvas.getContext('2d');
      resizeCanvasToDisplaySize(canvas);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      // 提示文字
      ctx.save();
      ctx.font = "14px sans-serif";
      ctx.fillStyle = "#64748b";
      ctx.textAlign = "center";
      ctx.fillText("（尚無足夠數據可繪圖）", canvas.width/2, canvas.height/2);
      ctx.restore();
    }

    function drawTrendChart() {
      const canvas = document.getElementById('stabilityChart');
      const ctx = canvas.getContext('2d');
      resizeCanvasToDisplaySize(canvas);

      const targetW = parseFloat(document.getElementById('target_total_weight').value);
      const errP = parseFloat(document.getElementById('error_percentage').value);
      if (!isFinite(targetW) || !isFinite(errP)) { clearChart(); return; }

      const USL = targetW * (1 + errP/100);
      const LSL = targetW * (1 - errP/100);

      const vals = Array.from(document.querySelectorAll('.data-in')).map(i => {
        const v = parseFloat(i.value);
        return isNaN(v) ? null : v;
      });

      const numeric = vals.filter(v => v !== null);
      if (numeric.length < 2) { clearChart(); return; }

      // 決定 y 範圍：包含 target/USL/LSL + 實測
      let yMin = Math.min(...numeric, LSL);
      let yMax = Math.max(...numeric, USL);
      // 加一點 padding
      const pad = (yMax - yMin) === 0 ? 0.05 : (yMax - yMin) * 0.10;
      yMin -= pad; yMax += pad;

      // 畫布參數
      const W = canvas.width, H = canvas.height;
      const margin = { l: 45, r: 15, t: 15, b: 35 };
      const plotW = W - margin.l - margin.r;
      const plotH = H - margin.t - margin.b;

      ctx.clearRect(0,0,W,H);

      // 背景
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0,0,W,H);

      // 網格/座標軸
      ctx.save();
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;

      // y 網格（5 條）
      const yTicks = 5;
      for (let i=0; i<=yTicks; i++) {
        const y = margin.t + (plotH * i / yTicks);
        ctx.beginPath();
        ctx.moveTo(margin.l, y);
        ctx.lineTo(W - margin.r, y);
        ctx.stroke();
      }

      // x 網格（每 5 點一條）
      for (let i=1; i<=30; i++) {
        if (i % 5 !== 0) continue;
        const x = margin.l + plotW * ((i-1) / 29);
        ctx.beginPath();
        ctx.moveTo(x, margin.t);
        ctx.lineTo(x, H - margin.b);
        ctx.stroke();
      }
      ctx.restore();

      // y 軸文字
      ctx.save();
      ctx.fillStyle = "#475569";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let i=0; i<=yTicks; i++) {
        const y = margin.t + (plotH * i / yTicks);
        const val = yMax - (yMax - yMin) * (i / yTicks);
        ctx.fillText(val.toFixed(3), margin.l - 6, y);
      }
      ctx.restore();

      // x 軸文字（1, 10, 20, 30）
      ctx.save();
      ctx.fillStyle = "#475569";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      [1,10,20,30].forEach(i => {
        const x = margin.l + plotW * ((i-1)/29);
        ctx.fillText(String(i), x, H - margin.b + 6);
      });
      ctx.restore();

      // helper：座標轉換
      const xOf = (i) => margin.l + plotW * ((i-1)/29);
      const yOf = (v) => margin.t + plotH * (1 - (v - yMin) / (yMax - yMin));

      // 規格線/Target（顏色不硬寫，保持你原本語意：target 綠、規格紅、實測藍）
      // Target
      drawHLine(ctx, yOf(targetW), margin.l, W - margin.r, "#32CD32", []);
      // USL/LSL
      drawHLine(ctx, yOf(USL), margin.l, W - margin.r, "#dc2626", [6,4]);
      drawHLine(ctx, yOf(LSL), margin.l, W - margin.r, "#dc2626", [6,4]);

      // 實測折線（跳過 null）
      ctx.save();
      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2;
      ctx.setLineDash([]);
      ctx.beginPath();
      let started = false;
      for (let i=1; i<=30; i++) {
        const v = vals[i-1];
        if (v === null) { started = false; continue; }
        const x = xOf(i), y = yOf(v);
        if (!started) { ctx.moveTo(x,y); started = true; }
        else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.restore();

      // 點
      ctx.save();
      ctx.fillStyle = "#2563eb";
      for (let i=1; i<=30; i++) {
        const v = vals[i-1];
        if (v === null) continue;
        const x = xOf(i), y = yOf(v);
        ctx.beginPath();
        ctx.arc(x, y, 2.6, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();

      // 簡易圖例
      ctx.save();
      ctx.font = "12px sans-serif";
      ctx.fillStyle = "#0f172a";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      const lx = margin.l + 6, ly = margin.t + 6;
      legendItem(ctx, lx, ly, "#2563eb", "實測(mg)");
      legendItem(ctx, lx, ly+16, "#32CD32", "Target");
      legendItem(ctx, lx, ly+32, "#dc2626", "規格線(USL/LSL)", [6,4]);
      ctx.restore();
    }

    function drawHLine(ctx, y, x1, x2, color, dash) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.setLineDash(dash || []);
      ctx.beginPath();
      ctx.moveTo(x1, y);
      ctx.lineTo(x2, y);
      ctx.stroke();
      ctx.restore();
    }

    function legendItem(ctx, x, y, color, text, dash) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.setLineDash(dash || []);
      ctx.beginPath();
      ctx.moveTo(x, y+6);
      ctx.lineTo(x+18, y+6);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#0f172a";
      ctx.fillText(text, x+24, y);
      ctx.restore();
    }

    function resizeCanvasToDisplaySize(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(rect.width * dpr));
      const height = Math.max(1, Math.floor(rect.height * dpr));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        return true;
      }
      return false;
    }

    // ===== 匯出 PDF（列印） =====
    function exportPDFReport() {
      // 先確保畫面最新
      runAnalysis();
      drawTrendChart();

      // 把 canvas 變成圖（嵌入列印頁）
      const canvas = document.getElementById('stabilityChart');
      document.getElementById('p-chart-img').src = canvas.toDataURL('image/png', 1.0);

      document.getElementById('p-date-now').innerText = "Report Date: " + new Date().toLocaleString();
      document.getElementById('p-avg').innerText = document.getElementById('resAvg').innerText;
      document.getElementById('p-std').innerText = document.getElementById('resStd').innerText;
      document.getElementById('p-cpk').innerText = document.getElementById('resCpk').innerText;

      const statusBox = document.getElementById('status');
      document.getElementById('p-final-status').innerText = statusBox.innerText || "-";
      document.getElementById('p-final-status').className = statusBox.className === 'pass' ? 'green-text' : 'red-text';

      const table = document.getElementById('p-table-params');
      table.innerHTML = `
        <tr>
          <th>測試人員</th><td>${escapeHtml(document.getElementById('tester_name').value || '')}</td>
          <th>膠水資訊</th><td>${escapeHtml(document.getElementById('glue_info').value || '')}</td>
        </tr>
        <tr>
          <th>目標重量 / 誤差%</th><td>${escapeHtml(document.getElementById('target_total_weight').value)} mg / ±${escapeHtml(document.getElementById('error_percentage').value)}%</td>
          <th>Cpk 閥值</th><td>${escapeHtml(document.getElementById('cpk_threshold').value)}</td>
        </tr>
        <tr>
          <th>Rising / Open</th><td>${escapeHtml(document.getElementById('p_rising').value)} / ${escapeHtml(document.getElementById('p_open').value)} ms</td>
          <th>Falling / Delay</th><td>${escapeHtml(document.getElementById('p_falling').value)} / ${escapeHtml(document.getElementById('p_delay').value)} ms</td>
        </tr>
        <tr>
          <th>線性校準結果</th><td>${escapeHtml(document.getElementById('m1Res').innerText)}</td>
          <th>線性記錄時間</th><td class="green-text">${escapeHtml(document.getElementById('t1_main').innerText)}</td>
        </tr>
        <tr>
          <th>採用單點基準</th><td style="font-weight:bold;">${escapeHtml(document.getElementById('targetSingle').value)} mg</td>
          <th>容許誤差(σ)</th><td>${escapeHtml(document.getElementById('errSingle').innerText)}</td>
        </tr>
      `;

      const dataTable = document.getElementById('p-data-table');
      dataTable.innerHTML = '';
      const tW = parseFloat(document.getElementById('target_total_weight').value);
      const eP = parseFloat(document.getElementById('error_percentage').value);
      document.querySelectorAll('.data-in').forEach((input, i) => {
        const val = parseFloat(input.value) || 0;
        const isO = isFinite(tW) && isFinite(eP) && (val > (tW*(1+eP/100)) || val < (tW*(1-eP/100)));
        dataTable.innerHTML += `
          <div class="p-data-item">
            <span>#${i+1}: <b class="${isO?'red-text':''}">${escapeHtml(input.value || '')}</b></span>
            <span class="green-text">${escapeHtml(document.getElementById('t-data-'+(i+1)).innerText || '')}</span>
          </div>
        `;
      });

      const oldT = document.title;
      const name = (document.getElementById('tester_name').value || 'Unknown').trim() || 'Unknown';
      document.title = "Stability_Report_" + name + "_" + new Date().toLocaleDateString();
      window.print();
      document.title = oldT;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    // ===== 清除/區域清除 =====
    function clearArea(ids) {
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        if (el.tagName === 'INPUT') el.value = '';
        else el.innerText = '';
      });
      autoUpdateDots();
    }

    function resetInputs() {
      const inputs = document.querySelectorAll('input');
      inputs.forEach(i => {
        if (i.id === 'density') i.value = '1.70';
        else if (i.id === 'error_percentage') i.value = '5';
        else if (i.id === 'target_total_weight') i.value = '1.00';
        else if (i.id === 'cpk_threshold') i.value = '1.66';
        else if (i.id === 'targetSingle') i.value = '0.003';
        else if (i.id === 'testDots') i.value = '';
        else i.value = '';
      });

      document.querySelectorAll('.time-msg').forEach(el => el.innerText = '');
      document.getElementById('resAvg').innerText = '-';
      document.getElementById('resStd').innerText = '-';
      document.getElementById('resCpk').innerText = '-';
      document.getElementById('resSingle').innerText = '-';
      document.querySelectorAll('.data-in').forEach(i => i.classList.remove('out-of-range'));

      document.getElementById('status').style.display = 'none';

      m1Val = 0; m2Val = 0; adoptedMethod = "";
      runMethod1(); runMethod2();
      autoUpdateDots();
      clearChart();
    }

    // ===== 範例資料（可選） =====
    function loadDemoData() {
      // 這是「按下去才灌」：避免你原本那種一開頁就污染真實資料
      document.getElementById('p_rising').value = 0.25;
      document.getElementById('p_open').value = 1.0;
      document.getElementById('p_falling').value = 0.8;
      document.getElementById('p_delay').value = 2.0;

      document.getElementById('w1000').value = 3.012;
      document.getElementById('w2000').value = 6.025;
      document.getElementById('w3000').value = 9.038;
      document.getElementById('w4000').value = 12.018;
      document.getElementById('w5000').value = 15.025;

      runMethod1();

    // ===== localStorage：自動保存/恢復 =====
    function autosave() {
      try {
        const data = snapshot();
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      } catch (_) { /* ignore */ }
    }

    function restore() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (!data || typeof data !== "object") return;

        // inputs
        for (const [id, val] of Object.entries(data.inputs || {})) {
          const el = document.getElementById(id);
          if (el && el.tagName === "INPUT") el.value = val;
        }
        // times
        for (const [id, val] of Object.entries(data.times || {})) {
          const el = document.getElementById(id);
          if (el) el.innerText = val;
        }
      } catch (_) { /* ignore */ }
    }

    function snapshot() {
      const inputs = {};
      document.querySelectorAll('input').forEach(el => {
        if (!el.id) return;
        // 不保存 testDots（它是推導結果），但保存也無妨
        inputs[el.id] = el.value;
      });

      const times = {};
      document.querySelectorAll('.time-msg').forEach(el => {
        if (!el.id) return;
        times[el.id] = el.innerText;
      });

      return { inputs, times, ts: Date.now() };
    }

    function applySafeDefaultsIfEmpty() {
      // 你原始碼會在 onload 直接塞「😎請輸入...」那種假 value，這會污染報表
      // 這裡只做「必要的數值預設」，不做任何假資料
      if (!document.getElementById('density').value) document.getElementById('density').value = '1.70';
      if (!document.getElementById('error_percentage').value) document.getElementById('error_percentage').value = '5';
      if (!document.getElementById('target_total_weight').value) document.getElementById('target_total_weight').value = '1.00';
      if (!document.getElementById('cpk_threshold').value) document.getElementById('cpk_threshold').value = '1.66';
      if (!document.getElementById('targetSingle').value) document.getElementById('targetSingle').value = '0.003';
    }

    function hasAtLeastTwoDataPoints() {
      const vals = Array.from(document.querySelectorAll('.data-in')).map(i => parseFloat(i.value)).filter(v => !isNaN(v));
      return vals.length >= 2;
    }
